# MAPPO hyperparameters — Stage 2 curriculum
algorithm: "mappo"
stage: 2

# --- Network ---
hidden_dim: 256
n_layers: 2
use_rnn: false
activation: "relu"

# --- PPO ---
lr: 2.0e-4                   # slightly lower than stage 1; policy starts warm
gamma: 0.99
gae_lambda: 0.95
eps_clip: 0.2
epochs_per_update: 10
mini_batch_size: 800
entropy_coef: 0.05
value_loss_coef: 0.5
max_grad_norm: 0.5

# --- Rollout ---
n_envs: 32
batch_size: 3200
episode_limit: 500            # stage 2 max steps

# --- Training ---
t_max: 5000000               # more steps: harder task (3 targets, walls, battery)
eval_interval: 10000
eval_episodes: 20
log_interval: 2000

# --- Action space ---
grid_size: 4                  # 4x4 target grid → 35 discrete actions

# --- Misc ---
seed: 42
use_cuda: true
save_model: true
save_interval: 100000
checkpoint_dir: "checkpoints"
use_tensorboard: true
tb_log_dir: "tb_logs"
common_reward: true
reward_scale: 0.1
